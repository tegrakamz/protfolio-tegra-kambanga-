<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Tegra Kambanga</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }

    @keyframes scaleIn {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .animate-scale {
      animation: scaleIn 0.3s ease forwards;
    }
  </style>
</head>

<body class="bg-gray-50 text-gray-900 antialiased">

  <div class="max-w-6xl mx-auto px-8 py-12 bg-white min-h-screen shadow-sm">

    <!-- HEADER -->
    <header class="bg-white shadow p-4 mb-8 md:mb-12">
      <div class="max-w-5xl mx-auto flex justify-between items-center">
        <h1 class="font-bold text-lg">Tegra Kambanga</h1>
        <nav class="space-x-4 text-sm">
          <a href="index.html" class="text-blue-600 font-semibold">Accueil</a>
          <a href="cv.html" class="text-blue-600 font-semibold">CV</a>
          <a href="projet.html" class="text-blue-600 font-semibold">Projets</a>
        </nav>
      </div>
    </header>

    <!-- MAIN -->
    <main class="max-w-5xl mx-auto">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-20">

        <!-- INFOS -->
        <div class="space-y-12">
          <h2 class="text-4xl font-bold mb-10">Contact</h2>
          <p class="text-gray-600 lowercase">ecrivez moi pour une collaboration ou autres choses</p>

          <div class="space-y-6">
            <div>
              <h3 class="font-bold text-lg">Phone</h3>
              <p class="text-gray-600">0826469151</p>
            </div>
            <div>
              <h3 class="font-bold text-lg">Email</h3>
              <p class="text-gray-600 lowercase">tegrakamz@gmail.com</p>
            </div>
          </div>
        </div>

        <!-- FORMULAIRE -->
        <form id="contact-form" class="space-y-6 relative">

          <div class="grid grid-cols-2 gap-4">
            <input name="first_name" type="text" placeholder="First Name" required class="border border-black p-3">
            <input name="last_name" type="text" placeholder="Last Name" required class="border border-black p-3">
          </div>

          <div class="grid grid-cols-2 gap-4">
            <input name="email" type="email" placeholder="Email" required class="border border-black p-3">
            <input name="subject" type="text" placeholder="Subject" required class="border border-black p-3">
          </div>

          <textarea name="message" rows="5" placeholder="Message" required class="border border-black p-3 w-full"></textarea>

          <button type="submit" class="w-24 h-24 rounded-full bg-blue-600 text-white font-bold hover:bg-blue-700 transition shadow-lg">
            Envoyer
          </button>

        </form>

      </div>
    </main>

  </div>

  <!-- SUCCESS MESSAGE -->
  <div id="success-message" class="fixed inset-0 flex items-center justify-center bg-black/30 hidden z-50">
    <div class="bg-white px-10 py-8 rounded-2xl shadow-xl text-center animate-scale">
      <div class="text-green-500 text-5xl mb-3">✔</div>
      <p class="text-gray-800 font-semibold">Message envoyé avec succès</p>
    </div>
  </div>

  <!-- EMAILJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <script>
    (function(){
      emailjs.init("QD6NtET3zAcU0ydbx");
    })();

    const form = document.getElementById("contact-form");
    const successMessage = document.getElementById("success-message");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const emailInput = form.querySelector('input[name="email"]');
        const email = emailInput.value.trim();

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

        if (!emailRegex.test(email)) {
            alert("❌ Email invalide (ex: exemple@gmail.com)");
            emailInput.focus();
            return;
        }

        emailjs.sendForm("service_350xmm3", "template_wkx6ayc", this)
        .then(function() {

            form.reset();

            successMessage.classList.remove("hidden");

            setTimeout(() => {
                successMessage.classList.add("hidden");
            }, 3000);

        }, function(error) {
            alert("❌ Erreur d'envoi");
            console.log(error);
        });
    });
  </script>

</body>
</html>
