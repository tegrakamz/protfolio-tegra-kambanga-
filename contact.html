<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Tegra Kambanga</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-gray-50 text-gray-900 antialiased">

  <div class="max-w-6xl mx-auto px-8 py-12 bg-white min-h-screen shadow-sm">

    <!-- HEADER -->
    <header class="flex justify-between items-center mb-32">
      <h1 class="text-xl font-bold tracking-tight">Tegra Kambanga Wa Kabamba</h1>
      <nav class="flex gap-8 text-sm font-medium text-gray-600">
        <a href="index.html" class="hover:text-black">Accueil</a>
        <a href="cv.html" class="hover:text-black">CV</a>
        <a href="projets.html" class="hover:text-black">Projets</a>
        <a href="contact.html" class="hover:text-black border-b-2 border-black pb-1">Contact</a>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="max-w-5xl mx-auto">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-20">
        
        <!-- INFOS -->
        <div class="space-y-12">
          <h2 class="text-4xl font-bold mb-10">Contact</h2>
          
          <div class="space-y-6">
            <div>
              <h3 class="font-bold text-lg">Phone</h3>
              <p class="text-gray-600">0826469151</p>
            </div>
            <div>
              <h3 class="font-bold text-lg">Email</h3>
              <p class="text-gray-600 lowercase">tegrakamz@gmail.com</p>
            </div>
          </div>
        </div>

        <!-- FORMULAIRE -->
        <form id="contact-form" class="space-y-6 relative">

          <div class="grid grid-cols-2 gap-4">
            <div class="flex flex-col gap-2">
              <label class="text-xs font-semibold text-gray-500 ml-1">First Name</label>
              <input name="first_name" type="text" required class="border border-black p-3 focus:outline-none focus:ring-1 focus:ring-blue-500 bg-transparent">
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-xs font-semibold text-gray-500 ml-1">Last Name</label>
              <input name="last_name" type="text" required class="border border-black p-3 focus:outline-none focus:ring-1 focus:ring-blue-500 bg-transparent">
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="flex flex-col gap-2">
              <label class="text-xs font-semibold text-gray-500 ml-1">Email</label>
              <input name="email" type="email" required class="border border-black p-3 focus:outline-none focus:ring-1 focus:ring-blue-500 bg-transparent">
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-xs font-semibold text-gray-500 ml-1">Subject</label>
              <input name="subject" type="text" required class="border border-black p-3 focus:outline-none focus:ring-1 focus:ring-blue-500 bg-transparent">
            </div>
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-xs font-semibold text-gray-500 ml-1">Message</label>
            <textarea name="message" rows="5" required class="border border-black p-3 focus:outline-none focus:ring-1 focus:ring-blue-500 bg-transparent resize-none"></textarea>
          </div>

          <div class="flex justify-start md:absolute md:-right-12 md:bottom-0">
            <button type="submit" class="w-24 h-24 rounded-full bg-blue-600 text-white font-bold text-sm hover:bg-blue-700 transition shadow-lg flex items-center justify-center">
              Envoyer
            </button>
          </div>

        </form>

      </div>
    </main>

    <!-- FOOTER -->
    <footer class="border-t border-gray-200 pt-8 grid grid-cols-1 md:grid-cols-4 gap-8 text-sm">
      <div>
        <h4 class="font-bold mb-2">Téléphone</h4>
        <p class="text-gray-500">+243 826 469 151</p>
      </div>

      <div>
        <h4 class="font-bold mb-2">Email</h4>
        <p class="text-gray-500 underline">tegrakamz@gmail.com</p>
      </div>

      <div>
        <h4 class="font-bold mb-2">Suivez-moi</h4>
        <div class="flex gap-4 opacity-70">
            <a href="https://www.instagram.com/lm_kamz/" target="_blank"><img src="image/instagram.png" alt="IG" class="w-5 h-5"></a>
            <a href="https://www.linkedin.com/in/tegra-kambanga-7a7120327/" target="_blank"><img src="image/linkedin.png" alt="IN" class="w-5 h-5"></a>
            <a href="" target="_blank"><img src="image/twitter.png" alt="X" class="w-5 h-5"></a>
            <a href="https://web.facebook.com/tegrakamz" target="_blank"><img src="image/facebook.webp" alt="FB" class="w-5 h-5"></a>
        </div>
      </div>

      <div class="md:text-right flex items-end justify-end">
        <p class="text-gray-400 text-xs">© 2026 By tegra kamz</p>
      </div>
    </footer>

  </div>

  <!-- EMAILJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

 <script>
(function(){
  emailjs.init("QD6NtET3zAcU0ydbx");
})();

const form = document.getElementById("contact-form");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    emailjs.sendForm("service_350xmm3", "template_wkx6ayc", this)
    .then(function() {
        // succès → on vide le formulaire
        form.reset();
    }, function(error) {
        //  erreur → on garde les données + message
        alert("❌ Erreur d'envoi, veuillez réessayer.");
        console.log(error);
    });
});
</script>

</body>
</html>
